receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000

service:
  extensions:
    - "health_check"
  pipelines:
    traces:
      receivers:
        - "otlp"
      processors:
        - "batch"
      exporters:
        - "clickhouse"

